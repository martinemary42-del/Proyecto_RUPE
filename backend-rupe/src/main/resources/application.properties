spring.application.name=backend-rupe
# Puerto local por defecto. En alojamiento se puede sobrescribir con SERVER_PORT.
server.port=${SERVER_PORT:8080}


# Conexion local segura por variables de entorno. Los valores despues de ":" solo son fallback para desarrollo.
spring.datasource.url=${RUPE_DB_URL:jdbc:mysql://localhost:3306/bd_rupe?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true}
spring.datasource.username=${RUPE_DB_USER:root}
spring.datasource.password=${RUPE_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# En local se permite update para acelerar desarrollo; en produccion se recomienda validate.
spring.jpa.hibernate.ddl-auto=${RUPE_DDL_AUTO:update}
spring.jpa.show-sql=${RUPE_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.servlet.session.timeout=30m

rupe.frontend.allowed-origins=${RUPE_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:8081,http://127.0.0.1:8081}
rupe.frontend.public-base-url=${RUPE_PUBLIC_BASE_URL:http://localhost:5500}
rupe.security.captcha-after-attempts=3
rupe.security.max-login-attempts=5
rupe.security.lock-minutes=15
# Solo en desarrollo local puede mostrarse el token para probar recuperacion sin SMTP real.
rupe.security.expose-reset-token=${RUPE_EXPOSE_RESET_TOKEN:true}

rupe.turnstile.siteverify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify
rupe.turnstile.secret-key=${RUPE_TURNSTILE_SECRET:0x4AAAAAAD2qcOftlLYVzrWX}
rupe.turnstile.enabled=${RUPE_TURNSTILE_ENABLED:true}

# Correo SMTP. En local queda desactivado; en produccion se activa con RUPE_MAIL_ENABLED=true.
rupe.mail.enabled=${RUPE_MAIL_ENABLED:false}
rupe.mail.from=${RUPE_MAIL_FROM:no-reply@rupe.local}
spring.mail.host=${RUPE_MAIL_HOST:localhost}
spring.mail.port=${RUPE_MAIL_PORT:587}
spring.mail.username=${RUPE_MAIL_USERNAME:}
spring.mail.password=${RUPE_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${RUPE_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${RUPE_MAIL_SMTP_STARTTLS:true}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
