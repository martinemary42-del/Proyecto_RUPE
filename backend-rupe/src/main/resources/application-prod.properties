# Perfil de produccion para alojamiento gratuito o servidor publico.
# Se activa con: SPRING_PROFILES_ACTIVE=prod

# En produccion no se debe modificar automaticamente el esquema.
spring.jpa.hibernate.ddl-auto=${RUPE_DDL_AUTO:validate}
spring.jpa.show-sql=${RUPE_SHOW_SQL:false}

# Seguridad de recuperacion: el token nunca debe regresar visible al frontend.
rupe.security.expose-reset-token=false

# CAPTCHA real y correo real deben estar activos en produccion.
rupe.turnstile.enabled=true
rupe.mail.enabled=${RUPE_MAIL_ENABLED:true}

# Cookies de sesion endurecidas para HTTPS.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${RUPE_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=${RUPE_COOKIE_SAME_SITE:none}
